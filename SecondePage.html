<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cephalometry Report Page</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: ITC Avant Garde Gothic, Montserrat, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* حاوية الصفحة بحجم A4 */
        .page-container {
            width: 794px; 
            height: 1123px; 
            background-color: #ffffff;
            position: relative;
            display: flex;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        /* الشريط الجانبي الأيمن */
        .sidebar {
            width: 35px; /* عرض الشريط الجانبي */
            height: 100%;
            background-color: #3b4158;
            position: absolute;
            right: 0;
            top: 0;
            z-index: 5;
        }

        /* مساحة المحتوى الرئيسية (تترك مساحة للشريط الجانبي) */
        .main-content {
            width: calc(100% - 35px);
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* ترويسة الصفحة (Header) */
        .header {
            display: flex;
            align-items: center;
            height: 55px; /* ارتفاع الترويسة */
            border-bottom: 1px solid #d1d1d1; /* الخط السفلي للترويسة */
        }

        /* العلامة الصفراء (Cephalometry) */
        .yellow-tab {
            background-color: #dfb74c;
            color: #1a2342;
            font-size: 26px;
            font-weight: 700;
            height: 100%;
            padding: 0 30px;
            display: flex;
            align-items: center;
            border-bottom-right-radius: 25px; /* الانحناء في الأسفل جهة اليمين */
        }

        /* اسم المريض */
        .patient-name {
            color: #3b4158;
            font-size: 16px;
            margin-left: 20px;
            flex-grow: 1; /* لدفع الشعار إلى أقصى اليمين */
        }

        /* الشعار (Logo) */
        .logo {
            font-size: 22px;
            color: #000;
            padding-right: 20px;
        }

        .logo strong {
            font-weight: 900;
        }

        /* مساحة العمل البيضاء السفلية (لإضافة الصور أو النصوص مستقبلاً) */
        .content-area {
            flex-grow: 1;
            padding: 40px;
            /* يمكن إضافة خصائص أخرى هنا لاحقاً */
        }

    </style>
</head>
<body>

    <div class="page-container">
        <div class="main-content">
            
            <div class="header">
                <div class="yellow-tab">Cephalometry</div>
                <div class="patient-name">[Name]</div>
                <div class="logo"><strong>Golden</strong>Dentist</div>
            </div>

            <div class="content-area">
                </div>
            
        </div>

        <div class="sidebar"></div>
    </div>

</body>
</html>
